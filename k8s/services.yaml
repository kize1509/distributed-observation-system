apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: snus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: snus-ingestion:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: snus-config
            - secretRef:
                name: snus-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: snus
spec:
  selector:
    app: ingestion
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
